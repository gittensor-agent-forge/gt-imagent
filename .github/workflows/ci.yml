name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: imagent-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: imagent-ui
        run: npm ci

      - name: Lint UI
        working-directory: imagent-ui
        run: npm run lint

      - name: Build UI
        working-directory: imagent-ui
        run: npm run build
